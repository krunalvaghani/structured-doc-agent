# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect repo, or `render blueprint launch`
services:
  - type: web
    name: structured-doc-agent
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        value: https://openrouter.ai/api
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: EXTRACTOR_BACKEND
        value: api
      - key: EXTRACTOR_HOST
        value: 0.0.0.0
      - key: EXTRACTOR_RATE_LIMIT_ENABLED
        value: "true"
      - key: EXTRACTOR_RATE_LIMIT_PER_IP
        value: "5"
      - key: EXTRACTOR_RATE_LIMIT_GLOBAL_DAILY
        value: "20"
